<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <title>Your Cart — Lunera</title>
    <link rel="stylesheet" href="style.css" />
</head>

<body>

    <nav class="nav">
        <button class="nav__back-btn" onclick="goBackOrHome()" aria-label="Go Back">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M19 12H5M12 19l-7-7 7-7"/></svg>
  </button>
        <a href="index.html" class="nav__logo">LUNERA</a>
        <div class="nav__links">
            <a href="index.html">Home</a><a href="shop.html">Shop</a><a href="shop.html?cat=men">Men</a><a
                href="shop.html?cat=women">Women</a><a href="about.html">About</a>
        </div>
        <div class="nav__actions">
            <a href="cart.html" class="nav__icon" style="position:relative"><svg width="18" height="18"
                    viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                    <path d="M6 2 3 6v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2V6l-3-4z" />
                    <line x1="3" y1="6" x2="21" y2="6" />
                    <path d="M16 10a4 4 0 0 1-8 0" />
                </svg><span class="nav__cart-count" style="display:none">0</span></a>
        </div>
    </nav>
    <div class="nav__mobile" id="mobileNav">
        <a href="index.html">Home</a><a href="shop.html">Shop</a><a href="shop.html?cat=men">Men</a><a
            href="shop.html?cat=women">Women</a><a href="about.html">About</a><a href="contact.html">Contact</a>
    </div>

    <div class="page-content">
        <div style="padding:1.5rem 4% 0">
            <div class="section-label" style="margin-bottom:.3rem">Your Bag</div>
            <h1 class="section-title" style="text-align:left;margin-bottom:1.5rem">Shopping Cart</h1>

            <!-- EMPTY STATE -->
            <div class="empty-state" id="cart-empty" style="display:none">
                <div class="empty-state__icon">🛍️</div>
                <h3>Your bag is empty</h3>
                <p>Start shopping to add items to your cart.</p>
                <a href="shop.html" class="btn btn-primary" style="margin-top:1.5rem">Browse Collection</a>
            </div>

            <!-- CART CONTENT -->
            <div id="cart-wrap" style="display:none;flex-direction:column;gap:1.2rem">
                <div class="cart-layout">
                    <div>
                        <div id="cart-items"></div>
                        <a href="shop.html"
                            style="display:inline-flex;align-items:center;gap:.4rem;color:var(--grey);font-size:.84rem;margin-top:1rem;min-height:44px">←
                            Continue Shopping</a>
                    </div>
                    <div>
                        <div class="cart-summary">
                            <h3>Order Summary</h3>
                            <div id="cart-summary-content"></div>
                            <!-- Promo code -->
                            <div style="display:flex;gap:.6rem;margin:1rem 0">
                                <input id="promoInput" type="text" class="form-input"
                                    placeholder="Promo code (LUNERA15)" style="min-height:44px;font-size:.88rem" />
                                <button onclick="applyPromo()" class="btn btn-dark"
                                    style="min-height:44px;padding:.75rem 1rem;font-size:.82rem;flex-shrink:0">Apply</button>
                            </div>
                            <a href="checkout.html" class="btn btn-primary btn-full btn-lg">Proceed to Checkout →</a>
                            <div
                                style="display:flex;justify-content:center;gap:1.5rem;margin-top:.8rem;font-size:.72rem;color:var(--grey)">
                                <span>🔒 Secure</span><span>🚚 Free over ₵600</span><span>↩️ Free returns</span>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <nav class="bottom-nav">
        <a href="index.html" class="bottom-nav__item"><svg viewBox="0 0 24 24" fill="none" stroke-width="2">
                <path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z" />
                <polyline points="9 22 9 12 15 12 15 22" />
            </svg>Home</a>
        <a href="shop.html" class="bottom-nav__item"><svg viewBox="0 0 24 24" fill="none" stroke-width="2">
                <circle cx="11" cy="11" r="8" />
                <path d="m21 21-4.35-4.35" />
            </svg>Shop</a>
        <a href="cart.html" class="bottom-nav__item"><svg viewBox="0 0 24 24" fill="none" stroke-width="2">
                <path d="M6 2 3 6v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2V6l-3-4z" />
                <line x1="3" y1="6" x2="21" y2="6" />
                <path d="M16 10a4 4 0 0 1-8 0" />
            </svg><span class="bottom-nav__badge" style="display:none">0</span>Cart</a>
        <a href="login.html" class="bottom-nav__item"><svg viewBox="0 0 24 24" fill="none" stroke-width="2">
                <path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2" />
                <circle cx="12" cy="7" r="4" />
            </svg>Profile</a>
    </nav>

    <script src="app.js"></script>
    <script>
        function applyPromo() {
            const code = document.getElementById('promoInput').value.trim().toUpperCase();
            if (code === 'LUNERA15') {
                showToast('15% discount applied! 🎉');
            } else {
                showToast('Invalid promo code', '✕');
            }
        }
        renderCartPage();
    </script>
</body>

</html>
