<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <title>Product — Lunera</title>
    <link rel="stylesheet" href="style.css" />
</head>

<body>

    <nav class="nav">
        <button class="nav__back-btn" onclick="goBackOrHome()" aria-label="Go Back">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5">
                <path d="M19 12H5M12 19l-7-7 7-7" />
            </svg>
        </button>
        <a href="index.html" class="nav__logo">LUNERA</a>
        <div class="nav__links">
            <a href="index.html">Home</a><a href="shop.html">Shop</a><a href="shop.html?cat=men">Men</a><a
                href="shop.html?cat=women">Women</a><a href="shop.html?tag=new-drop">New Drops</a><a
                href="about.html">About</a>
        </div>
        <div class="nav__actions">
            <a href="shop.html" class="nav__icon nav__search-icon"><svg width="18" height="18" viewBox="0 0 24 24"
                    fill="none" stroke="currentColor" stroke-width="2">
                    <circle cx="11" cy="11" r="8" />
                    <path d="m21 21-4.35-4.35" />
                </svg></a>
            <a href="cart.html" class="nav__icon" style="position:relative"><svg width="18" height="18"
                    viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                    <path d="M6 2 3 6v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2V6l-3-4z" />
                    <line x1="3" y1="6" x2="21" y2="6" />
                    <path d="M16 10a4 4 0 0 1-8 0" />
                </svg><span class="nav__cart-count" style="display:none">0</span></a>
            <a href="login.html" class="nav__icon"><svg width="18" height="18" viewBox="0 0 24 24" fill="none"
                    stroke="currentColor" stroke-width="2">
                    <path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2" />
                    <circle cx="12" cy="7" r="4" />
                </svg></a>
        </div>
    </nav>
    <div class="nav__mobile" id="mobileNav">
        <a href="index.html">Home</a><a href="shop.html">Shop</a><a href="shop.html?cat=men">Men</a><a
            href="shop.html?cat=women">Women</a><a href="about.html">About</a><a href="contact.html">Contact</a>
    </div>

    <div class="page-content" id="pageContent">

        <!-- MOBILE SWIPEABLE GALLERY (mobile only) -->
        <div class="product-gallery__slider" id="gallerySlider"></div>
        <div class="gallery-dots" id="galleryDots"></div>

        <div class="product-detail" style="padding:0 4%">

            <!-- DESKTOP GALLERY (tablet+) -->
            <div>
                <div class="product-gallery__main" id="mainImage">
                    <img id="mainImg" src="" alt="Product" />
                </div>
                <div class="product-gallery__thumbs" id="thumbs"></div>
            </div>

            <!-- PRODUCT INFO -->
            <div class="product-info" id="productInfo">
                <div class="product-info__category" id="pCategory"></div>
                <h1 id="pName"></h1>
                <div class="product-info__rating">
                    <span class="stars" id="pStars"></span>
                    <span id="pReviews"></span>
                </div>
                <div class="product-info__price" id="pPrice"></div>
                <p class="product-info__desc" id="pDesc"></p>

                <div class="product-info__label">Select Size</div>
                <div class="size-select-grid" id="sizeGrid"></div>

                <div class="product-info__label">Quantity</div>
                <div class="qty-picker">
                    <button class="qty-btn" id="qtyMinus">−</button>
                    <span class="qty-value" id="qtyVal">1</span>
                    <button class="qty-btn" id="qtyPlus">+</button>
                </div>

                <div class="product-actions">
                    <button class="btn btn-primary btn-lg btn-full" id="addToCartBtn">Add to Cart</button>
                    <button class="btn btn-dark btn-lg btn-full" id="buyNowBtn">Buy Now →</button>
                </div>

                <div style="display:flex;gap:1.5rem;padding-top:1rem;border-top:1px solid var(--border);flex-wrap:wrap">
                    <div style="display:flex;align-items:center;gap:.5rem;font-size:.78rem;color:var(--grey)">
                        <span>🚚</span> Free shipping over ₵600
                    </div>
                    <div style="display:flex;align-items:center;gap:.5rem;font-size:.78rem;color:var(--grey)">
                        <span>↩️</span> Easy 30-day returns
                    </div>
                    <div style="display:flex;align-items:center;gap:.5rem;font-size:.78rem;color:var(--grey)">
                        <span>✨</span> Premium quality
                    </div>
                </div>
            </div>
        </div>

        <!-- RELATED PRODUCTS -->
        <div style="padding:2rem 4%;padding-bottom:calc(var(--bottom-nav-h) + 80px + 1rem)">
            <div class="section-header" style="text-align:left;margin-bottom:1.2rem">
                <div class="section-label">You May Also Like</div>
            </div>
            <div class="products-grid" id="relatedGrid"></div>
        </div>
    </div>

    <!-- STICKY ADD TO CART BAR (mobile only) -->
    <div class="sticky-atc" id="stickyAtc" style="display:none">
        <div class="sticky-atc__info">
            <div class="sticky-atc__name" id="stickyName"></div>
            <div class="sticky-atc__price" id="stickyPrice"></div>
        </div>
        <button class="btn btn-primary sticky-atc__btn" onclick="stickyAdd()">Add to Cart</button>
    </div>

    <nav class="bottom-nav">
        <a href="index.html" class="bottom-nav__item"><svg viewBox="0 0 24 24" fill="none" stroke-width="2">
                <path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z" />
                <polyline points="9 22 9 12 15 12 15 22" />
            </svg>Home</a>
        <a href="shop.html" class="bottom-nav__item"><svg viewBox="0 0 24 24" fill="none" stroke-width="2">
                <circle cx="11" cy="11" r="8" />
                <path d="m21 21-4.35-4.35" />
            </svg>Shop</a>
        <a href="cart.html" class="bottom-nav__item" style="position:relative"><svg viewBox="0 0 24 24" fill="none"
                stroke-width="2">
                <path d="M6 2 3 6v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2V6l-3-4z" />
                <line x1="3" y1="6" x2="21" y2="6" />
                <path d="M16 10a4 4 0 0 1-8 0" />
            </svg><span class="bottom-nav__badge" style="display:none">0</span>Cart</a>
        <a href="login.html" class="bottom-nav__item"><svg viewBox="0 0 24 24" fill="none" stroke-width="2">
                <path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2" />
                <circle cx="12" cy="7" r="4" />
            </svg>Profile</a>
    </nav>

    <script src="app.js"></script>
    <script>
        // Load product
        const params = new URLSearchParams(window.location.search);
        const pid = parseInt(params.get('id') || '1');
        const product = PRODUCTS.find(p => p.id === pid) || PRODUCTS[0];

        let selectedSize = null;
        let qty = 1;

        // Populate info
        document.getElementById('pCategory').textContent = product.category.toUpperCase() + ' · ' + product.gender.toUpperCase();
        document.getElementById('pName').textContent = product.name;
        document.getElementById('pStars').textContent = '★'.repeat(Math.round(product.rating)) + '☆'.repeat(5 - Math.round(product.rating));
        document.getElementById('pReviews').textContent = `${product.rating} (${product.reviews} reviews)`;
        document.getElementById('pPrice').innerHTML = `₵${product.price}${product.originalPrice ? `<del>₵${product.originalPrice}</del>` : ''}`;
        document.getElementById('pDesc').textContent = product.description;
        document.getElementById('stickyName').textContent = product.name;
        document.getElementById('stickyPrice').textContent = `₵${product.price}`;
        document.title = `${product.name} — Lunera`;

        // Size buttons
        const sizeGrid = document.getElementById('sizeGrid');
        product.sizes.forEach(size => {
            const btn = document.createElement('button');
            btn.className = 'size-select-btn';
            btn.textContent = size;
            btn.addEventListener('click', () => {
                sizeGrid.querySelectorAll('.size-select-btn').forEach(b => b.classList.remove('selected'));
                btn.classList.add('selected');
                selectedSize = size;
            });
            sizeGrid.appendChild(btn);
        });

        // Qty
        document.getElementById('qtyMinus').addEventListener('click', () => {
            qty = Math.max(1, qty - 1);
            document.getElementById('qtyVal').textContent = qty;
        });
        document.getElementById('qtyPlus').addEventListener('click', () => {
            qty = Math.min(10, qty + 1);
            document.getElementById('qtyVal').textContent = qty;
        });

        function handleAddToCart() {
            if (!selectedSize) { showToast('Please select a size first', '✕'); return; }
            addToCart(product.id, selectedSize, qty);
        }
        function stickyAdd() { handleAddToCart(); }
        document.getElementById('addToCartBtn').addEventListener('click', handleAddToCart);
        document.getElementById('buyNowBtn').addEventListener('click', () => {
            handleAddToCart();
            if (selectedSize) setTimeout(() => window.location.href = 'checkout.html', 600);
        });

        // Mobile: swipeable gallery
        const slider = document.getElementById('gallerySlider');
        const dots = document.getElementById('galleryDots');
        const images = product.images && product.images.length ? product.images : [product.image];
        images.forEach((img, i) => {
            const slide = document.createElement('div');
            slide.className = 'product-gallery__slide';
            slide.innerHTML = `<img src="${img}" alt="${product.name}" loading="${i === 0 ? 'eager' : 'lazy'}" />`;
            slider.appendChild(slide);

            const dot = document.createElement('span');
            dot.className = 'gallery-dot' + (i === 0 ? ' active' : '');
            dots.appendChild(dot);
        });
        // Update dots on scroll
        slider.addEventListener('scroll', () => {
            const idx = Math.round(slider.scrollLeft / slider.offsetWidth);
            dots.querySelectorAll('.gallery-dot').forEach((d, i) => d.classList.toggle('active', i === idx));
        });

        // Desktop: thumbnail gallery
        const mainImg = document.getElementById('mainImg');
        mainImg.src = product.image;
        const thumbsEl = document.getElementById('thumbs');
        images.forEach((img, i) => {
            const t = document.createElement('div');
            t.className = 'product-gallery__thumb' + (i === 0 ? ' active' : '');
            t.innerHTML = `<img src="${img}" alt="" loading="lazy" />`;
            t.addEventListener('click', () => {
                mainImg.src = img;
                thumbsEl.querySelectorAll('.product-gallery__thumb').forEach(th => th.classList.remove('active'));
                t.classList.add('active');
            });
            thumbsEl.appendChild(t);
        });

        // Sticky ATC: show after scrolling past main image
        const stickyBar = document.getElementById('stickyAtc');
        window.addEventListener('scroll', () => {
            stickyBar.style.display = window.scrollY > 300 ? 'flex' : 'none';
        });

        // Related products
        const related = PRODUCTS.filter(p => p.id !== product.id && (p.gender === product.gender || p.category === product.category)).slice(0, 4);
        document.getElementById('relatedGrid').innerHTML = related.map(p => productCardHTML(p)).join('');
    </script>
</body>

</html>
