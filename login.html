<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Sign In — Lunera</title>
    <link rel="stylesheet" href="style.css" />
</head>

<body>
    <nav class="nav">
        <a href="index.html" class="nav__logo">LUNERA</a>
        <div class="nav__links"><a href="index.html">Home</a><a href="shop.html">Shop</a></div>
        <div class="nav__actions">
            <a href="cart.html" class="nav__icon" style="position:relative"><svg width="18" height="18"
                    viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                    <path d="M6 2 3 6v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2V6l-3-4z" />
                    <line x1="3" y1="6" x2="21" y2="6" />
                    <path d="M16 10a4 4 0 0 1-8 0" />
                </svg><span class="nav__cart-count" style="display:none">0</span></a>
            <button class="nav__back-btn" onclick="goBackOrHome()" aria-label="Go Back">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M19 12H5M12 19l-7-7 7-7"/></svg>
  </button>
        </div>
    </nav>
    <div class="nav__mobile" id="mobileNav"><a href="index.html">Home</a><a href="shop.html">Shop</a></div>

    <div class="page-content">
        <div class="section" style="min-height:85vh;display:flex;align-items:center;justify-content:center">
            <div style="width:100%;max-width:480px">
                <div style="text-align:center;margin-bottom:2rem">
                    <a href="index.html"
                        style="font-size:1.8rem;font-weight:800;letter-spacing:.08em;background:linear-gradient(135deg,var(--gold-light),var(--gold));-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text">LUNERA</a>
                    <div class="section-label" style="margin-top:.8rem">Welcome Back</div>
                    <h1 style="font-size:1.6rem;font-weight:800;margin-top:.3rem">Sign In</h1>
                </div>

                <div class="form-card" style="max-width:100%">
                    <!-- Social login -->
                    <div class="social-login">
                        <button class="social-btn" onclick="socialLogin('Google')">
                            <svg width="20" height="20" viewBox="0 0 24 24">
                                <path fill="#4285F4"
                                    d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z" />
                                <path fill="#34A853"
                                    d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z" />
                                <path fill="#FBBC05"
                                    d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z" />
                                <path fill="#EA4335"
                                    d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z" />
                            </svg>
                            Continue with Google
                        </button>
                        <button class="social-btn" onclick="socialLogin('Apple')">
                            <svg width="20" height="20" viewBox="0 0 24 24" fill="white">
                                <path
                                    d="M18.71 19.5c-.83 1.24-1.71 2.45-3.05 2.47-1.34.03-1.77-.79-3.29-.79-1.53 0-2 .77-3.27.82-1.31.05-2.3-1.32-3.14-2.53C4.25 17 2.94 12.45 4.7 9.39c.87-1.52 2.43-2.48 4.12-2.51 1.28-.02 2.5.87 3.29.87.78 0 2.26-1.07 3.8-.91.65.03 2.47.26 3.64 1.98-.09.06-2.17 1.28-2.15 3.81.03 3.02 2.65 4.03 2.68 4.04-.03.07-.42 1.44-1.38 2.83M13 3.5c.73-.83 1.94-1.46 2.94-1.5.13 1.17-.34 2.35-1.04 3.19-.69.85-1.83 1.51-2.95 1.42-.15-1.15.41-2.35 1.05-3.11z" />
                            </svg>
                            Continue with Apple
                        </button>
                    </div>

                    <div class="divider">or sign in with email</div>

                    <form onsubmit="handleLogin(event)">
                        <div class="form-group">
                            <label class="form-label">Email Address</label>
                            <input type="email" class="form-input" placeholder="your@email.com" required />
                        </div>
                        <div class="form-group">
                            <label class="form-label">Password</label>
                            <input type="password" class="form-input" placeholder="••••••••" required />
                        </div>
                        <div
                            style="display:flex;justify-content:space-between;align-items:center;margin-bottom:1.2rem;font-size:.82rem">
                            <label style="display:flex;align-items:center;gap:.4rem;cursor:pointer;color:var(--grey)">
                                <input type="checkbox" style="accent-color:var(--gold)" /> Remember me
                            </label>
                            <a href="#" style="color:var(--gold);transition:opacity .2s"
                                onmouseover="this.style.opacity='.7'" onmouseout="this.style.opacity='1'">Forgot
                                password?</a>
                        </div>
                        <button type="submit" class="btn btn-primary btn-full btn-lg">Sign In</button>
                    </form>

                    <p style="text-align:center;margin-top:1.3rem;font-size:.85rem;color:var(--grey)">
                        Don't have an account? <a href="signup.html" style="color:var(--gold)">Create one</a>
                    </p>
                </div>
            </div>
        </div>
    </div>

    
<nav class="bottom-nav">
  <a href="index.html" class="bottom-nav__item"><svg viewBox="0 0 24 24" fill="none" stroke-width="2"><path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/><polyline points="9 22 9 12 15 12 15 22"/></svg>Home</a>
  <a href="shop.html" class="bottom-nav__item"><svg viewBox="0 0 24 24" fill="none" stroke-width="2"><circle cx="11" cy="11" r="8"/><path d="m21 21-4.35-4.35"/></svg>Shop</a>
  <a href="cart.html" class="bottom-nav__item" style="position:relative"><svg viewBox="0 0 24 24" fill="none" stroke-width="2"><path d="M6 2 3 6v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2V6l-3-4z"/><line x1="3" y1="6" x2="21" y2="6"/><path d="M16 10a4 4 0 0 1-8 0"/></svg><span class="bottom-nav__badge" style="display:none">0</span>Cart</a>
  <a href="login.html" class="bottom-nav__item"><svg viewBox="0 0 24 24" fill="none" stroke-width="2"><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/><circle cx="12" cy="7" r="4"/></svg>Profile</a>
</nav>

<script src="app.js"></script>
    <script>
        function handleLogin(e) {
            e.preventDefault();
            showToast('Signed in successfully! (Demo Mode)', '✓');
            setTimeout(() => window.location.href = 'index.html', 1200);
        }
        function socialLogin(provider) {
            showToast(`${provider} login (Demo Mode)`, '✓');
            setTimeout(() => window.location.href = 'index.html', 1200);
        }
    </script>
</body>

</html>
